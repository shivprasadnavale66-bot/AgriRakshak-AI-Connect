<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/weather.css">
</head>

<body>

    <div class="weather-container">

        <h2>🌦️ Weather Forecast</h2>

        <div class="search-box">
            <input
                type="text"
                id="city"
                placeholder="Enter city name">

            <button onclick="getWeather()">
                Search
            </button>
        </div>

        <div id="weatherResult" class="weather-card" style="display:none;">

            <h3 id="cityName"></h3>

            <p><strong>🌡️ Temperature:</strong> <span id="temperature"></span> °C</p>

            <p><strong>💧 Humidity:</strong> <span id="humidity"></span>%</p>

            <p><strong>🌬️ Wind Speed:</strong> <span id="windSpeed"></span> m/s</p>

            <p><strong>📊 Pressure:</strong> <span id="pressure"></span> hPa</p>

            <p><strong>☁️ Condition:</strong> <span id="description"></span></p>

        </div>

        <br>

        <button class="btn" onclick="location.href='dashboard.html'">
            ← Back to Dashboard
        </button>

    </div>

    <script src="js/weather.js"></script>

</body>

</html>
