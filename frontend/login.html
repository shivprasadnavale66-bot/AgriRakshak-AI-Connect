<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>User Login</h2>

<form id="loginForm">

<input type="email"
id="email"
placeholder="Enter Email"
required>

<br><br>

<input type="password"
id="password"
placeholder="Enter Password"
required>

<br><br>

<button type="submit" class="btn">

Login

</button>

</form>

<p id="message"></p>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

<script src="js/login.js"></script>

</body>

</html>
