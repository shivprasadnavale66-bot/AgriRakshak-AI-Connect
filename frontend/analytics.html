<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/analytics.css">
</head>

<body>

    <h2>📊 Dashboard Analytics</h2>

    <div class="analytics-container">

        <div class="card">
            <h3>👨‍🌾 Total Farmers</h3>
            <h1 id="farmers">0</h1>
        </div>

        <div class="card">
            <h3>🌱 Total Crops</h3>
            <h1 id="crops">0</h1>
        </div>

        <div class="card">
            <h3>💰 Market Prices</h3>
            <h1 id="marketPrices">0</h1>
        </div>

        <div class="card">
            <h3>🏛️ Government Schemes</h3>
            <h1 id="schemes">0</h1>
        </div>

    </div>

    <br>

    <button class="btn" onclick="location.href='dashboard.html'">
        ⬅ Back to Dashboard
    </button>

    <script src="js/analytics.js"></script>

</body>

</html>
