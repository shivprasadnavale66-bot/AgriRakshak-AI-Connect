<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Farmer</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
        }

        input,select{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:darkgreen;
        }

        #message{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Farmer</h2>

    <form id="farmerForm">

        <input type="text" id="fullName" placeholder="Full Name" required>

        <input type="text" id="mobileNumber" placeholder="Mobile Number" required>

        <input type="text" id="village" placeholder="Village" required>

        <input type="text" id="district" placeholder="District" required>

        <input type="text" id="state" placeholder="State" required>

        <input type="number" id="landArea" placeholder="Land Area (Acres)" required>

        <input type="text" id="soilType" placeholder="Soil Type">

        <input type="text" id="waterSource" placeholder="Water Source">

        <button type="submit">Save Farmer</button>

    </form>

    <p id="message"></p>

    <br>

    <a href="dashboard.html">
        <button>Back to Dashboard</button>
    </a>

</div>

<script src="add-farmer.js"></script>

</body>
</html>
